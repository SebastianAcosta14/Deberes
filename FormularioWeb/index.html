<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestión de Solicitudes de Permisos</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body class="bg-light">

    
    <header class="custom-header text-white p-4 mb-4 shadow-sm">
        <div class="container">
            <h1 class="h3"> Uso de Bootstrap y JavaScript en formularios</h1>
            <p class="mb-1"><strong>Estudiante:</strong> Sebastian Benjamin Acosta Andrade</p>
            <p class="mb-0"><strong>Materia:</strong> Desarrollo Web</p>
        </div>
    </header>

   
    <div class="container my-4">
        <div class="card shadow-sm mx-auto col-lg-10">
            <div class="card-body">
                <h5 class="card-title mb-4">Registro de Solicitud</h5>
                
                <form id="formulario">
                    <div class="row mb-3">
                        <div class="col-md-4">
                            <label class="form-label" for="cedula">Cédula:</label>
                            <input type="text" class="form-control" id="cedula" required>
                        </div>
                        <div class="col-md-4">
                            <label class="form-label" for="nombre">Nombre:</label>
                            <input type="text" class="form-control" id="nombre" required>
                        </div>
                        <div class="col-md-4">
                            <label class="form-label" for="apellido">Apellido:</label>
                            <input type="text" class="form-control" id="apellido" required>
                        </div>
                    </div>

                    <div class="row mb-4">
                        <div class="col-md-6">
                            <label class="form-label" for="fechaInicio">Fecha inicio:</label>
                            <input type="date" class="form-control" id="fechaInicio" required>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label" for="fechaFin">Fecha fin:</label>
                            <input type="date" class="form-control" id="fechaFin" required>
                        </div>
                    </div>

                    <div class="d-flex justify-content-between align-items-center mb-4">
                        <button type="submit" class="btn btn-primary">Agregar Solicitud</button>
                        <span class="fw-bold">Total Registros: <span id="contador" class="badge bg-secondary">0</span></span>
                    </div>
                </form>

                <hr>

             
                <div class="table-responsive mt-3">
                    <table class="table table-bordered table-striped table-hover align-middle">
                        <thead class="table-dark">
                            <tr>
                                <th>Cédula</th>
                                <th>Nombre</th>
                                <th>Apellido</th>
                                <th>Fecha Inicio</th>
                                <th>Fecha Fin</th>
                                <th>Acción</th>
                            </tr>
                        </thead>
                        <tbody id="tablaDatos">
                            
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script src="js/script.js"></script>
</body>
</html>
